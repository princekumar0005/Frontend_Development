<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form0.css">
    
</head>
<body >
    <h1>Job Application: Senior Web Developer</h1>
    <p>Thank you fm. Pleaseor youer interest in jonging our team. Please fill out the application below. </p>
    <hr>
    <form >
        <h2>Personal information </h2>
        <label for="name">Full Name:</label>
        <br>
        <input type="text" name="username" id="name" placeholder="eg.Prince" required>
        <br><br>
        <label for="email">Email:</label>
        <br>
        <input type="email" name="useremail" id="email" placeholder="eg..ABC@gmail.com" required>
        <br><br>
        <label for="phone">Phone:</label>
        <br>
        <input type="tel" name="userphone" id="phone" placeholder="eg.1234567890" required>
        <br><br>
        <label for="Link">Linkedin Profile URL:</label>
        <br>
        <input type="text" name="linkedin" id="Link" placeholder="https://linkedin.com/in/yo" required>
        <br><br>
        <hr>

        <h2>Professional Expeience</h2>
        <label for="file">Upload Your Resume (PDF or DOCX):</label>
        <br>
        <input type="file">
        <br><br>
        <label for="letter">Cover Letter:</label>
        <br>
        <textarea name="comment" id="letter" rows="9" cols="20" placeholder="Tell us why you're a great fit for this role..." ></textarea>
        <br><br>
        <label for="Experience">Year of Professional Experience:</label>
        <br>
        <input type="number" name="Experience" id="Experience">
        <br><br>
        <label for="SD">Earliest Possible Start Date:</label>
        <br>
        <input type="date" name="startdate" id="SD">
        <br>
        <hr>
        <h2>Skills & Availability</h2>
        <label>Primary Skillset (Choose one):</label>
        <br>
        <input type="radio" name="skillset" id="FD" value="Frontent Development">
        <label for="FD" >Frontent Development</label>
        <br>
        <input type="radio" name="skillset" id="BD" value="Backend Development">
        <label for="BD" >Backend Development</label>
        <br>
        <input type="radio" name="skillset" id="FSD" value="Full-Stack Development">
        <label for="FSD" >Full-Stack Development</label>
        <br><br>
        <label>Additional Skills( Select all that apply):</label>
        <br>
        <input type="checkbox" name="Additional skillset" id="R">
        <label for="R">React</label>
        <br>
        <input type="checkbox" name="Additional skillset" id="ND">
        <label for="ND">Node.js</label>
        <br>
        <input type="checkbox" name="Additional skillset" id="DM">
        <label for="DM">Database Management</label>
        <br>
        <input type="checkbox" name="Additional skillset" id="CD">
        <label for="CD">Cloud/DevOps</label>
        <br>
        <hr>
        <h2>Final Confirmation</h2>
        <input type="checkbox" name="agree" id="yas">
        <label for="yas">I am legally authorized to work in this country.</label>
        <br><br>
        <p>How did you hear about us?</p>
        <br>
        <input type="text" placeholder="eg.Linkedin,company">
        <br><br>
        <input type="submit" value="Submit Application">
        <input type="reset" value="Clear Form">

        
        
    </form>
    <br><br>

    <footer>
        



    </footer>



</body>
</html>
